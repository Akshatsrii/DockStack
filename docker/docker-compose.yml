version: "3"

services:

 backend:
  build:
   context: ..
   dockerfile: docker/Dockerfile.backend
  ports:
   - "5000:5000"

 frontend:
  build:
   context: ..
   dockerfile: docker/Dockerfile.frontend
  ports:
   - "3000:3000"

 nginx:
  image: nginx
  volumes:
   - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
  ports:
   - "80:80"
  depends_on:
   - backend
   - frontend